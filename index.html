<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #category-selector {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 400px;
            text-align: center;
            margin-bottom: 20px;
        }
        #category-selector select {
            padding: 10px;
            margin: 10px 0;
            width: 100%;
        }
        #start-btn {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #start-btn:hover {
            background: #218838;
        }
        #quiz-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 600px;
            display: none;
        }
        #progress-bar {
            width: 100%;
            height: 20px;
            background-color: #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
            position: relative;
        }
        #progress {
            height: 100%;
            background-color: #4CAF50;
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s;
        }
        #progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: black;
            font-weight: bold;
            font-size: 12px;
        }
        #question {
            font-size: 24px;
            margin-bottom: 20px;
        }
        #options {
            margin-bottom: 20px;
        }
        .option {
            display: block;
            margin: 10px 0;
            padding: 10px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }
        .option:hover {
            background: #e9e9e9;
        }
        .option.selected {
            background: #d1ecf1;
            border-color: #bee5eb;
        }
        #next-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #next-btn:hover {
            background: #0056b3;
        }
        #score {
            text-align: center;
            font-size: 20px;
            margin-top: 20px;
        }
        #restart-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #restart-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div id="category-selector">
        <h2>Select a Quiz Category</h2>
        <select id="category">
            <option value="JavaScript">JavaScript</option>
            <option value="Excel">Excel</option>
            <option value="General">General Knowledge</option>
        </select>
        <button id="start-btn">Start Quiz</button>
    </div>
    <div id="quiz-container">
        <div id="progress-bar">
            <div id="progress"></div>
            <span id="progress-text">0 / 0</span>
        </div>
        <div id="question"></div>
        <div id="options"></div>
        <button id="next-btn">Next</button>
        <div id="score"></div>
        <button id="restart-btn" style="display: none;">Restart Quiz</button>
    </div>

    <script>
        let questions = [];
        let currentQuestion = 0;
        let score = 0;
        let selectedOption = null;

        const categorySelector = document.getElementById('category-selector');
        const quizContainer = document.getElementById('quiz-container');
        const startBtn = document.getElementById('start-btn');
        const categorySelect = document.getElementById('category');
        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const nextBtn = document.getElementById('next-btn');
        const progressEl = document.getElementById('progress');
        const scoreEl = document.getElementById('score');
        const restartBtn = document.getElementById('restart-btn');

        startBtn.onclick = async () => {
            const category = categorySelect.value;
            try {
                const response = await fetch(`questions/${category}.json`);
                questions = await response.json();
                categorySelector.style.display = 'none';
                quizContainer.style.display = 'block';
                currentQuestion = 0;
                score = 0;
                selectedOption = null;
                document.getElementById('progress-text').textContent = `0 / ${questions.length}`;
                loadQuestion();
            } catch (error) {
                alert('Error loading questions. Please try again.');
                console.error(error);
            }
        };

        function loadQuestion() {
            const q = questions[currentQuestion];
            questionEl.textContent = `Question ${currentQuestion + 1}: ${q.question}`;
            optionsEl.innerHTML = '';
            q.options.forEach((opt) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt;
                div.onclick = () => selectOption(div, opt);
                optionsEl.appendChild(div);
            });
            selectedOption = null;
            nextBtn.disabled = true;
            updateProgress();
        }

        function selectOption(el, value) {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            selectedOption = value;
            nextBtn.disabled = false;
        }

        function nextQuestion() {
            if (selectedOption === questions[currentQuestion].answer) {
                score++;
            }
            currentQuestion++;
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showScore();
            }
        }

        function updateProgress() {
            const percent = (currentQuestion / questions.length) * 100;
            progressEl.style.width = percent + '%';
            document.getElementById('progress-text').textContent = `${currentQuestion} / ${questions.length}`;
        }

        function showScore() {
            questionEl.textContent = 'Quiz Completed!';
            optionsEl.innerHTML = '';
            nextBtn.style.display = 'none';
            scoreEl.textContent = `Your score: ${score} / ${questions.length}`;
            restartBtn.style.display = 'block';
        }

        nextBtn.onclick = nextQuestion;

        restartBtn.onclick = () => {
            location.reload();
        };
    </script>
</body>
</html>
